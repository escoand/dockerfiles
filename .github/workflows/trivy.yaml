name: trivy-scan

on:
  pull_request:
    paths:
      - "docker/**"
  push:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build Dockerfiles
        run: |
          for df in docker/**/Dockerfile; do
            dir=$(dirname "$df")
            tag=$(basename "$dir" | tr '[:upper:]' '[:lower:]')
            echo "Building $df"
            docker build -t "ci-$tag" "$dir"
          done

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ci-fail2ban
          exit-code: '1'
          severity: 'CRITICAL'

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ci-monitor
          exit-code: '1'
          severity: 'CRITICAL'