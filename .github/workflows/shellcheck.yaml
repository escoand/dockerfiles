name: shellcheck

on:
  pull_request:
    paths:
      - "**/*.sh"
  push:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          find . -name "*.sh" | xargs shellcheck