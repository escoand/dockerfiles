# Fail2Ban filter for Caddy path traversal attacks
# Detects common directory traversal patterns in HTTP requests
# Matches: ../, ..\.., /etc/passwd, and URL-encoded variants

[Definition]
failregex = "remote_ip":"<HOST>".*?"uri":"(?:.*?(?:\.\./|\.\.\\|\.\.%%2f|%%c0%%af|%%00|%%252e%%252e|\.\.%%5c).*?(?:passwd|shadow|windows|system|boot\.ini|web\.config|\.env))"
            "remote_ip":"<HOST>".*?"uri":"(?:.*?(?://|\.{3}|%%c0%%ae).*/etc/)"

ignoreregex = 

# This filter catches:
# - ../ and ..\ directory traversal sequences
# - %2f (URL-encoded /)
# - %c0%af (double-encoded /)
# - %00 (null byte)
# - %252e%252e (double-encoded ..)
# - Attempts to access sensitive files: passwd, shadow, windows, system, boot.ini, web.config, .env
# - File protocol handlers and multiple slashes
# - Triple dots (...) patterns

# Severity: Medium - Typical IDS threshold: 3-5 attempts in 10-minute window
